{% extends "base.html" %}
{% block title %}Update Metal Rate{% endblock %}
{% block content %}
<h2 class="page-title">Update Today's Metal Rate</h2>
<div class="card" style="max-width: 480px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-pawn">Save Rate</button>
      <a href="{% url 'core:metal_rate_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
