{% extends "base.html" %}
{% block title %}Login - Pawnshop Manager{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="page-title text-center">⚜ Pawnshop Manager</h3>
        <form method="post">
          {% csrf_token %}
          {% if form.errors %}
            <div class="alert alert-danger">Invalid username or password.</div>
          {% endif %}
          <div class="mb-3">
            <label class="form-label">Username</label>
            {{ form.username }}
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            {{ form.password }}
          </div>
          <button type="submit" class="btn btn-pawn w-100">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
